<?xml version="1.0" encoding="UTF-8"?>
<svg width="480" height="400" viewBox="0 0 480 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 底座平台 -->
    <g filter="url(#platform-shadow)">
        <!-- 底层 -->
        <path d="M80 300L240 380L400 300L240 220L80 300Z" fill="#1D2B53"/>
        <!-- 中层 -->
        <path d="M100 280L240 350L380 280L240 210L100 280Z" fill="#2B3B73"/>
        <!-- 顶层 -->
        <path d="M120 260L240 320L360 260L240 200L120 260Z" fill="#3B4B93"/>
    </g>

    <!-- 数据图表 -->
    <g transform="translate(140, 220)">
        <!-- 柱状图 -->
        <rect x="0" y="0" width="20" height="60" fill="#36D1DC" opacity="0.8">
            <animate attributeName="height" from="0" to="60" dur="1.5s" />
        </rect>
        <rect x="30" y="20" width="20" height="40" fill="#5B86E5" opacity="0.8">
            <animate attributeName="height" from="0" to="40" dur="1.2s" />
        </rect>
        <rect x="60" y="10" width="20" height="50" fill="#36D1DC" opacity="0.8">
            <animate attributeName="height" from="0" to="50" dur="1.8s" />
        </rect>
    </g>

    <!-- 圆形平台 -->
    <circle cx="240" cy="240" r="40" fill="url(#platform-gradient)" opacity="0.8">
        <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- 用户图标 -->
    <g transform="translate(220, 220)">
        <path d="M20 0C31 0 40 9 40 20C40 31 31 40 20 40C9 40 0 31 0 20C0 9 9 0 20 0Z" fill="#5B86E5" opacity="0.9"/>
        <path d="M10 15C10 12.2386 12.2386 10 15 10H25C27.7614 10 30 12.2386 30 15V25C30 27.7614 27.7614 30 25 30H15C12.2386 30 10 27.7614 10 25V15Z" fill="#36D1DC"/>
    </g>

    <!-- 浮动元素 -->
    <!-- 云朵 -->
    <g transform="translate(100, 100)">
        <path d="M25,60 a20,20 0 0,1 0,-40 a20,20 1 0,1 0,40" fill="#36D1DC" opacity="0.6">
            <animateTransform
                attributeName="transform"
                type="translate"
                values="0,0; 0,-10; 0,0"
                dur="3s"
                repeatCount="indefinite"
            />
        </path>
    </g>

    <!-- 数据面板 -->
    <g transform="translate(320, 160)">
        <rect x="0" y="0" width="80" height="40" rx="4" fill="#5B86E5" opacity="0.8"/>
        <path d="M10 10L70 10M10 20L50 20M10 30L60 30" stroke="#36D1DC" stroke-width="2"/>
    </g>

    <!-- 小球体 -->
    <g transform="translate(380, 280)">
        <circle cx="0" cy="0" r="10" fill="#36D1DC" opacity="0.8">
            <animate
                attributeName="cy"
                values="0;-10;0"
                dur="2s"
                repeatCount="indefinite"
            />
        </circle>
    </g>

    <!-- 渐变定义 -->
    <defs>
        <!-- 平台阴影 -->
        <filter id="platform-shadow" x="-20" y="-20" width="520" height="440">
            <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
            <feOffset dx="0" dy="4"/>
            <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
            <feColorMatrix values="0 0 0 0 0.21   0 0 0 0 0.82   0 0 0 0 0.86  0 0 0 0.5 0"/>
        </filter>

        <!-- 平台渐变 -->
        <linearGradient id="platform-gradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#36D1DC"/>
            <stop offset="100%" stop-color="#5B86E5"/>
        </linearGradient>
    </defs>

    <!-- 动画效果 -->
    <g>
        <circle cx="240" cy="240" r="45" stroke="url(#platform-gradient)" stroke-width="2" fill="none">
            <animate
                attributeName="r"
                values="45;50;45"
                dur="2s"
                repeatCount="indefinite"
            />
            <animate
                attributeName="opacity"
                values="0.6;0.2;0.6"
                dur="2s"
                repeatCount="indefinite"
            />
        </circle>
    </g>
</svg> 